<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Sistema de Distribución</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="error-body">

    <div class="error-container">

        <div class="error-icon">⚠️</div>

        <h2>Error en la autenticación</h2>

        <p>El usuario o contraseña no son válidos.
            Por favor verifica tus datos e intenta nuevamente.</p>

        <button onclick="window.location.href='/login'" class="btn-primary">
            Reintentar
        </button>

        <a href="/login" class="forgot-link">Recuperar contraseña</a>

        <footer>
            <p>Desarrollado por Juan Garzón – SENA 2025</p>
        </footer>

    </div>

</body>

</html>
